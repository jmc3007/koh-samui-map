<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koh Samui Hotels — Feb 11–18, 2027</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --dark: #0D1B2A;
    --panel: rgba(10, 18, 30, 0.93);
    --border: rgba(201,168,76,0.3);
    --text: #E8E0D0;
    --text-dim: #9A9080;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 1000;
  }
  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    letter-spacing: 0.04em;
    color: var(--gold-light);
  }
  .header-left p {
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .header-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .layer-btn {
    background: rgba(201,168,76,0.1);
    border: 1px solid var(--border);
    color: var(--gold);
    padding: 6px 14px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .layer-btn:hover, .layer-btn.active {
    background: var(--gold);
    color: var(--dark);
  }

  /* ── Map ── */
  #map {
    flex: 1;
    width: 100%;
  }

  /* ── Sidebar panel ── */
  #sidebar {
    position: absolute;
    right: 16px;
    top: 80px;
    width: 290px;
    max-height: calc(100vh - 110px);
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    z-index: 900;
    backdrop-filter: blur(12px);
    scrollbar-width: thin;
    scrollbar-color: var(--gold) transparent;
  }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }

  .sidebar-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--panel);
    border-radius: 12px 12px 0 0;
  }
  .sidebar-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    color: var(--gold-light);
    letter-spacing: 0.04em;
  }
  .sidebar-header p {
    font-size: 0.68rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  .hotel-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    transition: background 0.15s;
  }
  .hotel-card:hover { background: rgba(201,168,76,0.07); }
  .hotel-card.active { background: rgba(201,168,76,0.12); }
  .hotel-card:last-child { border-bottom: none; }

  .hotel-num {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .hotel-info { flex: 1; min-width: 0; }
  .hotel-name {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .hotel-meta {
    display: flex;
    gap: 8px;
    margin-top: 3px;
    font-size: 0.66rem;
    color: var(--text-dim);
  }
  .hotel-score {
    color: var(--gold);
    font-weight: 600;
  }
  .hotel-price { color: #7EC8A0; }

  /* ── Custom marker ── */
  .custom-marker {
    width: 34px;
    height: 34px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 2.5px solid rgba(255,255,255,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 12px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,255,255,0.1);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .custom-marker:hover {
    box-shadow: 0 4px 18px rgba(0,0,0,0.7), 0 0 0 4px rgba(255,255,255,0.2);
  }
  .marker-inner {
    transform: rotate(45deg);
    font-size: 0.68rem;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    font-family: 'DM Sans', sans-serif;
    line-height: 1;
  }

  /* ── Popup ── */
  .leaflet-popup-content-wrapper {
    background: var(--panel) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    padding: 0 !important;
    backdrop-filter: blur(16px);
  }
  .leaflet-popup-content {
    margin: 0 !important;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-width: 230px;
  }
  .leaflet-popup-tip-container { display: none; }
  .leaflet-popup-close-button {
    color: var(--text-dim) !important;
    top: 8px !important;
    right: 8px !important;
    font-size: 18px !important;
  }

  .popup-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .popup-rank {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--gold);
    margin-bottom: 3px;
  }
  .popup-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--gold-light);
    line-height: 1.2;
  }
  .popup-stars { font-size: 0.75rem; color: var(--gold); margin-top: 2px; }
  .popup-body { padding: 10px 16px 14px; }
  .popup-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .popup-row:last-child { border-bottom: none; }
  .popup-label { color: var(--text-dim); }
  .popup-val { color: var(--text); font-weight: 500; }
  .popup-val.good { color: #7EC8A0; }
  .popup-val.score { color: var(--gold); }

  /* ── Attribution tweak ── */
  .leaflet-control-attribution {
    background: rgba(10,18,30,0.75) !important;
    color: #666 !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: #888 !important; }

  /* ── Zoom control ── */
  .leaflet-control-zoom a {
    background: var(--panel) !important;
    color: var(--gold) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover {
    background: rgba(201,168,76,0.15) !important;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Koh Samui &mdash; Hotel Shortlist</h1>
    <p>6 properties &nbsp;·&nbsp; Feb 11–18, 2027 &nbsp;·&nbsp; 7 nights</p>
  </div>
  <div class="header-right">
    <button class="layer-btn active" onclick="setLayer('satellite')">Satellite</button>
    <button class="layer-btn" onclick="setLayer('streets')">Streets</button>
    <button class="layer-btn" onclick="setLayer('topo')">Terrain</button>
  </div>
</header>

<div id="map"></div>
<div id="sidebar"></div>

<script>
const hotels = [
  { rank:1, name:"Chaweng Garden",    stars:"★★★½",  lat:9.5312, lng:100.0633, price:"$157", score:"8.4", area:"Central Chaweng",  reno:"Premier Wing 2025", room:"61 sqm", color:"#1DB954" },
  { rank:2, name:"Samui Natien",      stars:"★★★½",  lat:9.5353, lng:100.0685, price:"$190", score:"7.9", area:"N. Chaweng Beach", reno:"Reno Dec 2025",     room:"63 sqm", color:"#2196F3" },
  { rank:3, name:"Garrya Tongsai Bay",stars:"★★★★★", lat:9.5783, lng:100.0789, price:"$326", score:"7.5", area:"Choeng Mon",       reno:"Reno 2022",         room:"72 sqm", color:"#4CAF50" },
  { rank:4, name:"Celes Samui",       stars:"★★★★",  lat:9.5632, lng:100.0204, price:"$169", score:"7.4", area:"Bophut Beach",     reno:"Ocean Wing 2018",   room:"50 sqm", color:"#FF9800" },
  { rank:5, name:"J4 Samui",          stars:"★★",    lat:9.5319, lng:100.0639, price:"$82",  score:"7.3", area:"Central Chaweng",  reno:"Built 2018",        room:"33 sqm", color:"#9C27B0" },
  { rank:6, name:"Banana Fan Sea",    stars:"★★★★",  lat:9.5232, lng:100.0586, price:"$322", score:"6.5", area:"S. Chaweng Beach", reno:"2001/2019",         room:"48 sqm", color:"#F44336" },
];

// ── Map init ──────────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [9.541, 100.052],
  zoom: 14,
  zoomControl: false,
});

L.control.zoom({ position: 'bottomright' }).addTo(map);

// ── Tile layers ───────────────────────────────────────────────────────────────
const layers = {
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, USGS, NOAA',
    maxZoom: 19
  }),
  streets: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19
  }),
  topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://opentopomap.org/">OpenTopoMap</a>',
    maxZoom: 17
  }),
};

let currentLayer = 'satellite';
layers.satellite.addTo(map);

function setLayer(name) {
  map.removeLayer(layers[currentLayer]);
  layers[name].addTo(map);
  currentLayer = name;
  document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// ── Markers ───────────────────────────────────────────────────────────────────
const markers = [];

hotels.forEach((h, i) => {
  const iconHtml = `
    <div class="custom-marker" style="background:${h.color}">
      <span class="marker-inner">#${h.rank}</span>
    </div>`;

  const icon = L.divIcon({
    html: iconHtml,
    className: '',
    iconSize: [34, 34],
    iconAnchor: [17, 34],
    popupAnchor: [0, -36],
  });

  const popupHtml = `
    <div class="popup-header">
      <div class="popup-rank">Rank #${h.rank} of 10</div>
      <div class="popup-name">${h.name}</div>
      <div class="popup-stars">${h.stars}</div>
    </div>
    <div class="popup-body">
      <div class="popup-row"><span class="popup-label">Score</span><span class="popup-val score">${h.score} / 10</span></div>
      <div class="popup-row"><span class="popup-label">Price</span><span class="popup-val good">${h.price} / night</span></div>
      <div class="popup-row"><span class="popup-label">Location</span><span class="popup-val">${h.area}</span></div>
      <div class="popup-row"><span class="popup-label">Room size</span><span class="popup-val">${h.room}</span></div>
      <div class="popup-row"><span class="popup-label">Notes</span><span class="popup-val">${h.reno}</span></div>
    </div>`;

  const marker = L.marker([h.lat, h.lng], { icon })
    .bindPopup(popupHtml, { maxWidth: 280, minWidth: 240 })
    .addTo(map);

  markers.push(marker);

  marker.on('click', () => {
    document.querySelectorAll('.hotel-card').forEach(c => c.classList.remove('active'));
    document.querySelector(`[data-rank="${h.rank}"]`).classList.add('active');
  });
});

// ── Sidebar ───────────────────────────────────────────────────────────────────
const sidebar = document.getElementById('sidebar');
sidebar.innerHTML = `
  <div class="sidebar-header">
    <h2>Shortlisted Hotels</h2>
    <p>Ranked by value score</p>
  </div>
  ${hotels.map(h => `
    <div class="hotel-card" data-rank="${h.rank}" onclick="flyTo(${h.rank})">
      <div class="hotel-num" style="background:${h.color}">${h.rank}</div>
      <div class="hotel-info">
        <div class="hotel-name">${h.name}</div>
        <div class="hotel-meta">
          <span class="hotel-score">${h.score}/10</span>
          <span class="hotel-price">${h.price}/nt</span>
          <span>${h.stars}</span>
        </div>
      </div>
    </div>
  `).join('')}
`;

function flyTo(rank) {
  const h = hotels[rank - 1];
  map.flyTo([h.lat, h.lng], 16, { duration: 1.2 });
  setTimeout(() => markers[rank - 1].openPopup(), 1200);
  document.querySelectorAll('.hotel-card').forEach(c => c.classList.remove('active'));
  document.querySelector(`[data-rank="${rank}"]`).classList.add('active');
}

// Fit all markers on load
const group = L.featureGroup(markers);
map.fitBounds(group.getBounds().pad(0.15));
</script>
</body>
</html>
